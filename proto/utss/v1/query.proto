syntax = "proto3";

package utss.v1;

import "google/api/annotations.proto";
import "cosmos/base/query/v1beta1/pagination.proto";

import "utss/v1/genesis.proto";
import "utss/v1/types.proto";

option go_package = "github.com/pushchain/push-chain-node/x/utss/types";

// Query Service
service Query {
  // Params queries module parameters.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/utss/v1/params";
  }

  // Current TSS Process
  rpc CurrentProcess(QueryCurrentProcessRequest) returns (QueryCurrentProcessResponse) {
    option (google.api.http).get = "/utss/v1/process/current";
  }

  // Process by ID
  rpc ProcessById(QueryProcessByIdRequest) returns (QueryProcessByIdResponse) {
    option (google.api.http).get = "/utss/v1/process/{id}";
  }

  // List all processes (paginated)
  rpc AllProcesses(QueryAllProcessesRequest) returns (QueryAllProcessesResponse) {
    option (google.api.http).get = "/utss/v1/process";
  }

  // Current TSS Key
  rpc CurrentKey(QueryCurrentKeyRequest) returns (QueryCurrentKeyResponse) {
    option (google.api.http).get = "/utss/v1/key/current";
  }

  // Get finalized TSS key by key_id
  rpc KeyById(QueryKeyByIdRequest) returns (QueryKeyByIdResponse) {
    option (google.api.http).get = "/utss/v1/key/{key_id}";
  }

  // List all finalized keys (paginated)
  rpc AllKeys(QueryAllKeysRequest) returns (QueryAllKeysResponse) {
    option (google.api.http).get = "/utss/v1/key";
  }

  // Get a single TSS event by auto-increment ID
  rpc GetTssEvent(QueryGetTssEventRequest) returns (QueryGetTssEventResponse) {
    option (google.api.http).get = "/utss/v1/event/{id}";
  }

  // Get a single pending TSS event by process ID
  rpc GetPendingTssEvent(QueryGetPendingTssEventRequest) returns (QueryGetPendingTssEventResponse) {
    option (google.api.http).get = "/utss/v1/event/pending/{process_id}";
  }

  // List all pending TSS events (paginated)
  rpc AllPendingTssEvents(QueryAllPendingTssEventsRequest) returns (QueryAllPendingTssEventsResponse) {
    option (google.api.http).get = "/utss/v1/event/pending";
  }

  // List all TSS events (paginated)
  rpc AllTssEvents(QueryAllTssEventsRequest) returns (QueryAllTssEventsResponse) {
    option (google.api.http).get = "/utss/v1/event";
  }

  // Get a fund migration by ID
  rpc GetFundMigration(QueryGetFundMigrationRequest) returns (QueryGetFundMigrationResponse) {
    option (google.api.http).get = "/utss/v1/migration/{id}";
  }

  // List pending fund migrations
  rpc PendingFundMigrations(QueryPendingFundMigrationsRequest) returns (QueryPendingFundMigrationsResponse) {
    option (google.api.http).get = "/utss/v1/migration/pending";
  }

  // List all fund migrations (paginated)
  rpc AllFundMigrations(QueryAllFundMigrationsRequest) returns (QueryAllFundMigrationsResponse) {
    option (google.api.http).get = "/utss/v1/migration";
  }
}

// Messages
message QueryParamsRequest {}
message QueryParamsResponse {
  Params params = 1;
}

message QueryCurrentProcessRequest {}
message QueryCurrentProcessResponse {
  TssKeyProcess process = 1;
}

message QueryProcessByIdRequest {
  uint64 id = 1;
}
message QueryProcessByIdResponse {
  TssKeyProcess process = 1;
}

message QueryAllProcessesRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}
message QueryAllProcessesResponse {
  repeated TssKeyProcess processes = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryCurrentKeyRequest {}
message QueryCurrentKeyResponse {
  TssKey key = 1;
}

message QueryKeyByIdRequest {
  string key_id = 1;
}
message QueryKeyByIdResponse {
  TssKey key = 1;
}

message QueryAllKeysRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}
message QueryAllKeysResponse {
  repeated TssKey keys = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// TSS Event queries
message QueryGetTssEventRequest {
  uint64 id = 1;
}
message QueryGetTssEventResponse {
  TssEvent event = 1;
}

message QueryGetPendingTssEventRequest {
  uint64 process_id = 1;
}
message QueryGetPendingTssEventResponse {
  TssEvent event = 1;
}

message QueryAllPendingTssEventsRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}
message QueryAllPendingTssEventsResponse {
  repeated TssEvent events = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryAllTssEventsRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}
message QueryAllTssEventsResponse {
  repeated TssEvent events = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// Fund Migration queries
message QueryGetFundMigrationRequest {
  uint64 id = 1;
}
message QueryGetFundMigrationResponse {
  FundMigration migration = 1;
}

message QueryPendingFundMigrationsRequest {}
message QueryPendingFundMigrationsResponse {
  repeated FundMigration migrations = 1;
}

message QueryAllFundMigrationsRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}
message QueryAllFundMigrationsResponse {
  repeated FundMigration migrations = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}
