syntax = "proto3";
package uexecutor.v1;

import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "uexecutor/v1/types.proto";
import "uexecutor/v1/gas_price.proto";
import "uexecutor/v1/chain_meta.proto";
import "uexecutor/v1/pending.proto";
import "cosmos/base/query/v1beta1/pagination.proto";

option go_package = "github.com/pushchain/push-chain-node/x/uexecutor/types";

// Query provides defines the gRPC querier service.
service Query {
  // Params queries all parameters of the module.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/uexecutor/v1/params";
  }

  // Queries all pending inbound IDs.
  rpc AllPendingInbounds(QueryAllPendingInboundsRequest) returns (QueryAllPendingInboundsResponse) {
    option (google.api.http).get = "/uexecutor/v1/pending_inbounds";
  }

  // Queries a single UniversalTx by ID.
  rpc GetUniversalTx(QueryGetUniversalTxRequest) returns (QueryGetUniversalTxResponse) {
    option (google.api.http).get = "/uexecutor/v1/universal_txs/{id}";
  }

  // Queries all UniversalTxs.
  rpc AllUniversalTx(QueryAllUniversalTxRequest) returns (QueryAllUniversalTxResponse) {
    option (google.api.http).get = "/uexecutor/v1/universal_txs";
  }

  // 🔹 Queries gas price for a specific chain
  rpc GasPrice(QueryGasPriceRequest) returns (QueryGasPriceResponse) {
    option (google.api.http).get = "/uexecutor/v1/gas_price/{chain_id}";
  }

  // 🔹 Queries all gas prices across chains
  rpc AllGasPrices(QueryAllGasPricesRequest) returns (QueryAllGasPricesResponse) {
    option (google.api.http).get = "/uexecutor/v1/gas_prices";
  }

  // 🔹 Queries chain meta for a specific chain
  rpc ChainMeta(QueryChainMetaRequest) returns (QueryChainMetaResponse) {
    option (google.api.http).get = "/uexecutor/v1/chain_meta/{chain_id}";
  }

  // 🔹 Queries all chain metas across chains
  rpc AllChainMetas(QueryAllChainMetasRequest) returns (QueryAllChainMetasResponse) {
    option (google.api.http).get = "/uexecutor/v1/chain_metas";
  }

  // Get a single pending outbound by ID
  rpc GetPendingOutbound(QueryGetPendingOutboundRequest) returns (QueryGetPendingOutboundResponse) {
    option (google.api.http).get = "/uexecutor/v1/pending_outbound/{outbound_id}";
  }

  // Get all pending outbounds (paginated)
  rpc AllPendingOutbounds(QueryAllPendingOutboundsRequest) returns (QueryAllPendingOutboundsResponse) {
    option (google.api.http).get = "/uexecutor/v1/pending_outbounds";
  }

  // Queries all expired inbound entries (per-variant audit trail of
  // inbounds whose ballots all reached EXPIRED/REJECTED without producing
  // a UniversalTx). Consumed by the future escape-hatch refund flow.
  rpc AllExpiredInbounds(QueryAllExpiredInboundsRequest) returns (QueryAllExpiredInboundsResponse) {
    option (google.api.http).get = "/uexecutor/v1/expired_inbounds";
  }
}

// ==========================
// Query messages
// ==========================

// Single gas price
message QueryGasPriceRequest {
  string chain_id = 1;
}

message QueryGasPriceResponse {
  GasPrice gas_price = 1;
}

// All gas prices
message QueryAllGasPricesRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryAllGasPricesResponse {
  repeated GasPrice gas_prices = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// Single chain meta
message QueryChainMetaRequest {
  string chain_id = 1;
}

message QueryChainMetaResponse {
  ChainMeta chain_meta = 1;
}

// All chain metas
message QueryAllChainMetasRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryAllChainMetasResponse {
  repeated ChainMeta chain_metas = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// Existing types
message QueryParamsRequest {}

// QueryParamsResponse is the response type for the Query/Params RPC method.
message QueryParamsResponse {
  // params defines the parameters of the module.
  Params params = 1;
}

// Pending Inbounds
message QueryAllPendingInboundsRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryAllPendingInboundsResponse {
  // Full per-variant audit-trail entries.
  repeated PendingInboundEntry entries = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// Expired Inbounds
message QueryAllExpiredInboundsRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryAllExpiredInboundsResponse {
  repeated ExpiredInboundEntry entries = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// Get UniversalTx
message QueryGetUniversalTxRequest {
  string id = 1;
}

message QueryGetUniversalTxResponse {
  UniversalTxLegacy universal_tx = 1;
}

message QueryAllUniversalTxRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryAllUniversalTxResponse {
  repeated UniversalTx universal_txs = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// Pending outbound index entry. Created by chain code at outbound creation
// (see create_outbound.go). Removed only when validators reach consensus
// on an OutboundObservation (see msg_vote_outbound.go). Ballot expiry does
// NOT remove the entry — operators investigate stuck outbounds via the
// per-variant audit trail (variants below) plus separate uvalidator ballot
// queries to see which ballots have terminated. See
// plan-pending-outbound-cleanup.md for design rationale.
message PendingOutboundEntry {
  string outbound_id     = 1;
  string universal_tx_id = 2;
  int64  created_at      = 3;
  // Per-variant audit trail, populated as votes arrive (RecordOutboundVote).
  repeated OutboundObservationVariant variants = 4 [(gogoproto.nullable) = false];
}

message QueryGetPendingOutboundRequest {
  string outbound_id = 1;
}

message QueryGetPendingOutboundResponse {
  PendingOutboundEntry entry    = 1;
  OutboundTx           outbound = 2;
}

message QueryAllPendingOutboundsRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryAllPendingOutboundsResponse {
  repeated PendingOutboundEntry entries   = 1;
  repeated OutboundTx           outbounds = 2;
  cosmos.base.query.v1beta1.PageResponse pagination = 3;
}
