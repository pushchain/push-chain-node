name: Release Mac Signed Binaries

on:
  # Trigger on version tags
  push:
    tags:
      - 'v*'

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

env:
  BINARY_NAME: pchaind
  PROJECT_NAME: push-chain

jobs:
  build-and-sign-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.3'
          cache: true

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Setup dkls23-rs
        uses: ./.github/actions/setup-dkls23
        with:
          ci_token: ${{ secrets.CI_DKLS_GARBLING }}

      - name: Copy dkls23-rs and garbling into build context
        run: |
          # Use rsync to handle symlinks properly, exclude ci/template which has broken symlinks
          rsync -a --exclude='ci/template' ../dkls23-rs/ ./dkls23-rs/
          rsync -a ../garbling/ ./garbling/
          # Update go.mod to use local path
          sed -i '' 's|go-wrapper => ../dkls23-rs/wrapper/go-wrappers|go-wrapper => ./dkls23-rs/wrapper/go-wrappers|' go.mod

      - name: Build dkls23-rs dependency
        run: |
          echo "Building dkls23-rs Rust library..."
          cd dkls23-rs
          cargo build --release
          echo "✓ dkls23-rs library built"

      - name: Import Code Signing Certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Decode certificate from base64
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate to keychain
          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Set keychain as default for codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Allow codesign to access the key without UI prompt
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          # Verify certificate is available
          echo "Available signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build Mac Binaries
        run: |
          mkdir -p dist
          VERSION=${{ steps.version.outputs.version }}

          # Set CGO flags for dkls23-rs
          export CGO_ENABLED=1
          export CGO_LDFLAGS="-L$(pwd)/dkls23-rs/target/release"

          echo "Building for Intel Mac (amd64)..."
          GOOS=darwin GOARCH=amd64 go build \
            -tags "netgo,ledger" \
            -ldflags="-s -w -X github.com/cosmos/cosmos-sdk/version.Version=${VERSION}" \
            -o dist/${BINARY_NAME}-darwin-amd64 \
            ./cmd/pchaind

          echo "Building for Apple Silicon (arm64)..."
          GOOS=darwin GOARCH=arm64 go build \
            -tags "netgo,ledger" \
            -ldflags="-s -w -X github.com/cosmos/cosmos-sdk/version.Version=${VERSION}" \
            -o dist/${BINARY_NAME}-darwin-arm64 \
            ./cmd/pchaind

          echo "Build complete:"
          ls -la dist/

      - name: Sign Binaries
        env:
          APPLE_IDENTITY: ${{ secrets.APPLE_IDENTITY }}
        run: |
          echo "Signing Intel binary..."
          codesign --force \
            --options runtime \
            --timestamp \
            --sign "$APPLE_IDENTITY" \
            dist/${BINARY_NAME}-darwin-amd64

          echo "Signing Apple Silicon binary..."
          codesign --force \
            --options runtime \
            --timestamp \
            --sign "$APPLE_IDENTITY" \
            dist/${BINARY_NAME}-darwin-arm64

          echo "Verifying signatures..."
          codesign -dv --verbose=2 dist/${BINARY_NAME}-darwin-amd64
          codesign -dv --verbose=2 dist/${BINARY_NAME}-darwin-arm64

      - name: Notarize Binaries
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          VERSION=${{ steps.version.outputs.version }}

          # Store notarization credentials
          xcrun notarytool store-credentials "notary-profile" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD"

          # Create archives for notarization (Apple requires zip/dmg/pkg)
          echo "Creating archives for notarization..."

          # Intel binary
          cd dist
          tar -czvf ${PROJECT_NAME}_${VERSION}_darwin_amd64.tar.gz ${BINARY_NAME}-darwin-amd64
          zip -j ${BINARY_NAME}-darwin-amd64-notarize.zip ${BINARY_NAME}-darwin-amd64

          # Apple Silicon binary
          tar -czvf ${PROJECT_NAME}_${VERSION}_darwin_arm64.tar.gz ${BINARY_NAME}-darwin-arm64
          zip -j ${BINARY_NAME}-darwin-arm64-notarize.zip ${BINARY_NAME}-darwin-arm64
          cd ..

          # Notarize Intel binary
          echo "Notarizing Intel binary..."
          xcrun notarytool submit dist/${BINARY_NAME}-darwin-amd64-notarize.zip \
            --keychain-profile "notary-profile" \
            --wait

          # Notarize Apple Silicon binary
          echo "Notarizing Apple Silicon binary..."
          xcrun notarytool submit dist/${BINARY_NAME}-darwin-arm64-notarize.zip \
            --keychain-profile "notary-profile" \
            --wait

          # Clean up notarization zips
          rm -f dist/*-notarize.zip

          echo "Notarization complete!"

      - name: Create Checksums
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cd dist

          # Create checksums for the tar.gz archives
          shasum -a 256 ${PROJECT_NAME}_${VERSION}_darwin_amd64.tar.gz > ${PROJECT_NAME}_${VERSION}_darwin_amd64.tar.gz.sha256
          shasum -a 256 ${PROJECT_NAME}_${VERSION}_darwin_arm64.tar.gz > ${PROJECT_NAME}_${VERSION}_darwin_arm64.tar.gz.sha256

          echo "Release assets:"
          ls -la

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-binaries-signed
          path: |
            dist/*.tar.gz
            dist/*.sha256
          retention-days: 30

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: |
            dist/${{ env.PROJECT_NAME }}_${{ steps.version.outputs.version }}_darwin_amd64.tar.gz
            dist/${{ env.PROJECT_NAME }}_${{ steps.version.outputs.version }}_darwin_arm64.tar.gz
            dist/*.sha256
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
